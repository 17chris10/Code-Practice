<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXP 19 – AJAX Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #f1f1f1;
            text-align: center;
        }
        form {
            background: #fff;
            display: inline-block;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            min-width: 300px;
        }
        input {
            display: block;
            margin: 10px auto;
            padding: 8px;
            width: 80%;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            padding: 8px 16px;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #0056b3;
        }
        #response {
            margin-top: 15px;
            font-weight: bold;
            padding: 10px;
        }
    </style>
</head>
<body>
    <h2>EXP 19 – AJAX Form Submission</h2>
    <form id="myForm">
        <input type="text" id="name" placeholder="Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <button type="submit">Submit</button>
    </form>
    <div id="response"></div>

    <script>
        const form = document.getElementById('myForm');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const responseDiv = document.getElementById('response');

        form.onsubmit = async (event) => {
            event.preventDefault();
            
            const name = nameInput.value.trim();
            const email = emailInput.value.trim();

            if (!name || !email) {
                showResponse("Please fill all fields!", "red");
                return;
            }

            showResponse("Submitting...", "black");

            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/posts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name, email })
                });

                if (!response.ok) {
                    throw new Error("Network error");
                }

                await response.json();
                showResponse("Submitted successfully!", "green");
                form.reset();

            } catch (error) {
                showResponse(`Error: ${error.message}`, "red");
            }
        };

        function showResponse(message, color) {
            responseDiv.textContent = message;
            responseDiv.style.color = color;
        }
    </script>
</body>
</html>
