<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Delay Function Example</title>
</head>
<body>
  <h1>Check the console after 2 seconds!</h1>

  <script>
    function delay(ms) {
      return new Promise((resolve) => {
        setTimeout(() => {
          resolve(`Resolved after ${ms} milliseconds`);
        }, ms);
      });
    }

    delay(2000).then((message) => {
      console.log(message); // Prints "Resolved after 2000 milliseconds" after 2 seconds
    });
  </script>
</body>
</html>
