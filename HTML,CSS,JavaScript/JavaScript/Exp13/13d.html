<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dynamic Background Color Changer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      transition: background-color 0.5s ease;
    }

    form {
      display: inline-block;
      padding: 20px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    label {
      margin: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    input[type="radio"] {
      margin-right: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Choose a Background Color</h1>

  <form id="colorForm">
    <label>
      <input type="radio" name="color" id="red" value="red"> Red
    </label>
    <label>
      <input type="radio" name="color" id="green" value="green"> Green
    </label>
    <label>
      <input type="radio" name="color" id="blue" value="blue"> Blue
    </label>
    <label>
      <input type="radio" name="color" id="yellow" value="yellow"> Yellow
    </label>
  </form>

  <script>
    // Get all color radio buttons by their IDs
    const red = document.getElementById('red');
    const green = document.getElementById('green');
    const blue = document.getElementById('blue');
    const yellow = document.getElementById('yellow');

    // Function to update background color
    function updateBackground() {
      if (red.checked) {
        document.body.style.backgroundColor = 'red';
      } else if (green.checked) {
        document.body.style.backgroundColor = 'green';
      } else if (blue.checked) {
        document.body.style.backgroundColor = 'blue';
      } else if (yellow.checked) {
        document.body.style.backgroundColor = 'yellow';
      }
    }

    // Add event listeners to each radio button
    red.addEventListener('change', updateBackground);
    green.addEventListener('change', updateBackground);
    blue.addEventListener('change', updateBackground);
    yellow.addEventListener('change', updateBackground);
  </script>
</body>
</html>
