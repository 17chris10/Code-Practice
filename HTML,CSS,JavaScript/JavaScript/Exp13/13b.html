<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Concurrent API Requests Example</title>
</head>
<body>
  <h1>Concurrent API Requests Example</h1>
  <p>Open your browser console to see the results.</p>

  <script>
    // Function that performs multiple API requests concurrently
    async function fetchMultipleAPIs() {
      try {
        const urls = [
          'https://jsonplaceholder.typicode.com/posts/1',
          'https://jsonplaceholder.typicode.com/users/1',
          'https://jsonplaceholder.typicode.com/todos/1'
        ];

        // Fetch all URLs concurrently
        const responses = await Promise.all(urls.map(url => fetch(url)));

        // Parse all responses as JSON concurrently
        const data = await Promise.all(responses.map(res => res.json()));

        // Merge all results into a single array
        const mergedResults = [].concat(...data);

        console.log("Merged Results:", mergedResults);
      } catch (error) {
        console.error("Error fetching data:", error);
      }
    }

    // Call the function
    fetchMultipleAPIs();
  </script>
</body>
</html>
