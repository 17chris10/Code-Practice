<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Observer Design Pattern - News Publisher</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 {
      color: #333;
    }
    .container {
      background: white;
      border-radius: 8px;
      padding: 20px 30px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      width: 400px;
      margin-top: 20px;
    }
    input, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
      font-size: 1em;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      cursor: pointer;
      background-color: #007bff;
      color: white;
      border: none;
    }
    button:hover {
      background-color: #0056b3;
    }
    .subscriber-list, .news-feed {
      margin-top: 15px;
      padding: 10px;
      background: #fafafa;
      border-radius: 5px;
      border: 1px solid #ddd;
      max-height: 200px;
      overflow-y: auto;
    }
    .subscriber {
      margin: 5px 0;
      padding: 5px;
      background: #e3f2fd;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <h1>📰 News Publisher (Observer Pattern)</h1>
  <div class="container">
    <h3>Add Subscriber</h3>
    <input type="text" id="subscriberName" placeholder="Enter subscriber name">
    <button id="subscribeBtn">Subscribe</button>
    <button id="unsubscribeBtn">Unsubscribe</button>

    <h3>Publish News</h3>
    <input type="text" id="newsInput" placeholder="Enter latest news">
    <button id="publishBtn">Publish</button>

    <h3>Subscribers</h3>
    <div class="subscriber-list" id="subscriberList"></div>

    <h3>News Feed</h3>
    <div class="news-feed" id="newsFeed"></div>
  </div>

  <script>
    // -----------------------------
    // Observer Design Pattern
    // -----------------------------
    class NewsPublisher {
      constructor() {
        this.subscribers = [];
      }

      subscribe(subscriber) {
        this.subscribers.push(subscriber);
      }

      unsubscribe(subscriber) {
        this.subscribers = this.subscribers.filter(sub => sub !== subscriber);
      }

      notify(news) {
        this.subscribers.forEach(sub => sub.update(news));
      }
    }

    // Subscriber (Observer)
    class Subscriber {
      constructor(name) {
        this.name = name;
      }

      update(news) {
        const newsFeed = document.getElementById('newsFeed');
        const div = document.createElement('div');
        div.classList.add('subscriber');
        div.textContent = `${this.name} received: "${news}"`;
        newsFeed.appendChild(div);
      }
    }

    // -----------------------------
    // DOM Interaction
    // -----------------------------
    const publisher = new NewsPublisher();
    const subscriberList = document.getElementById('subscriberList');

    document.getElementById('subscribeBtn').addEventListener('click', () => {
      const name = document.getElementById('subscriberName').value.trim();
      if (!name) return alert('Enter subscriber name!');
      
      const subscriber = new Subscriber(name);
      publisher.subscribe(subscriber);

      const div = document.createElement('div');
      div.classList.add('subscriber');
      div.textContent = name;
      div.id = name;
      subscriberList.appendChild(div);

      document.getElementById('subscriberName').value = '';
    });

    document.getElementById('unsubscribeBtn').addEventListener('click', () => {
      const name = document.getElementById('subscriberName').value.trim();
      if (!name) return alert('Enter subscriber name to unsubscribe!');

      const subscriberDiv = document.getElementById(name);
      if (subscriberDiv) {
        subscriberDiv.remove();
        publisher.unsubscribe(publisher.subscribers.find(sub => sub.name === name));
      } else {
        alert('Subscriber not found!');
      }
      document.getElementById('subscriberName').value = '';
    });

    document.getElementById('publishBtn').addEventListener('click', () => {
      const news = document.getElementById('newsInput').value.trim();
      if (!news) return alert('Enter news content!');
      
      publisher.notify(news);
      document.getElementById('newsInput').value = '';
    });
  </script>
</body>
</html>
