<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXP 18 – Quiz App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 30px;
            background: #fafafa;
            text-align: center;
        }
        #quiz {
            background: #fff;
            display: inline-block;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
            min-width: 300px;
        }
        button {
            margin-top: 10px;
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            background: #28a745;
            color: #fff;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #218838;
        }
        label {
            display: block;
            margin: 10px 0;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>EXP 18 – Quiz Application</h2>
    <div id="quiz"></div>

    <script>
        const questions = [
            {
                q: "Capital of India?",
                opt: ["Delhi", "Mumbai", "Chennai"],
                a: "Delhi"
            },
            {
                q: "5 + 7 = ?",
                opt: ["10", "12", "14"],
                a: "12"
            },
            {
                q: "Planet closest to Sun?",
                opt: ["Mercury", "Venus", "Mars"],
                a: "Mercury"
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        const quizContainer = document.getElementById('quiz');

        function loadQuestion() {
            const question = questions[currentQuestion];
            quizContainer.innerHTML = `
                <h3>Question ${currentQuestion + 1} of ${questions.length}</h3>
                <p>${question.q}</p>
                ${question.opt.map(option => `
                    <label>
                        <input type="radio" name="answer" value="${option}">
                        ${option}
                    </label>
                `).join('')}
                <br>
                <button onclick="submitAnswer()">Submit Answer</button>
            `;
        }

        function submitAnswer() {
            const selectedAnswer = document.querySelector('input[name="answer"]:checked');
            
            if (!selectedAnswer) {
                alert("Please select an answer!");
                return;
            }

            if (selectedAnswer.value === questions[currentQuestion].a) {
                score++;
            }

            currentQuestion++;

            if (currentQuestion < questions.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            const percentage = (score / questions.length) * 100;
            quizContainer.innerHTML = `
                <h3>Quiz Complete!</h3>
                <p>Your Score: ${score}/${questions.length} (${percentage}%)</p>
                <button onclick="location.reload()">Retry Quiz</button>
            `;
        }

        // Start the quiz
        loadQuestion();
    </script>
</body>
</html>
